<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="120" y1="120" x2="900" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#aee9ff"/>
      <stop offset="0.55" stop-color="#55b7ff"/>
      <stop offset="1" stop-color="#0a63d8"/>
    </linearGradient>

    <linearGradient id="bgInnerGrad" x1="160" y1="150" x2="860" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bff0ff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#5cc2ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#1b6eea"/>
    </linearGradient>

    <!-- Bottom label -->
    <linearGradient id="labelGrad" x1="0" y1="760" x2="0" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f1ff"/>
    </linearGradient>

    <!-- Dark board -->
    <linearGradient id="boardGrad" x1="360" y1="340" x2="720" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b3441"/>
      <stop offset="1" stop-color="#141a22"/>
    </linearGradient>

    <!-- PCB -->
    <linearGradient id="pcbGrad" x1="280" y1="520" x2="780" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38c46a"/>
      <stop offset="1" stop-color="#0f8f3d"/>
    </linearGradient>

    <!-- Battery -->
    <linearGradient id="batGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78c4ff"/>
      <stop offset="1" stop-color="#1a78ff"/>
    </linearGradient>

    <!-- Screen glow -->
    <linearGradient id="screenGrad" x1="420" y1="590" x2="600" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35f0ff"/>
      <stop offset="1" stop-color="#1ab0ff"/>
    </linearGradient>

    <!-- Metal -->
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f6f9"/>
      <stop offset="1" stop-color="#b9c3d2"/>
    </linearGradient>

    <!-- Gold -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#c98a00"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#0a2b6d" flood-opacity="0.35"/>
    </filter>

    <filter id="miniShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#061a45" flood-opacity="0.35"/>
    </filter>

    <!-- Rounded clip for app icon -->
    <clipPath id="iconClip">
      <rect x="80" y="80" width="864" height="864" rx="170" ry="170"/>
    </clipPath>
  </defs>

  <!-- App icon base -->
  <g clip-path="url(#iconClip)">
    <rect x="80" y="80" width="864" height="864" rx="170" ry="170" fill="url(#bgGrad)"/>
    <rect x="120" y="120" width="784" height="784" rx="150" ry="150" fill="url(#bgInnerGrad)" opacity="0.9"/>

    <!-- Sparkles -->
    <g opacity="0.85">
      <path d="M235 255 l18 0 0 18 -18 0 z" fill="#ffffff" opacity="0.0"/>
      <path d="M250 230
               c10 26 10 26 36 36
               c-26 10-26 10-36 36
               c-10-26-10-26-36-36
               c26-10 26-10 36-36z"
            fill="#ffffff" opacity="0.75"/>
      <path d="M790 210
               c9 24 9 24 33 33
               c-24 9-24 9-33 33
               c-9-24-9-24-33-33
               c24-9 24-9 33-33z"
            fill="#ffffff" opacity="0.7"/>
      <path d="M860 320
               c7 18 7 18 25 25
               c-18 7-18 7-25 25
               c-7-18-7-18-25-25
               c18-7 18-7 25-25z"
            fill="#ffffff" opacity="0.55"/>
      <circle cx="680" cy="260" r="3.5" fill="#ffffff" opacity="0.7"/>
      <circle cx="705" cy="300" r="2.8" fill="#ffffff" opacity="0.55"/>
      <circle cx="340" cy="290" r="3.2" fill="#ffffff" opacity="0.6"/>
    </g>

    <!-- Main illustration group -->
    <g filter="url(#softShadow)">
      <!-- PCB base -->
      <g filter="url(#miniShadow)">
        <rect x="235" y="520" width="554" height="270" rx="34" fill="url(#pcbGrad)"/>
        <!-- PCB holes -->
        <g fill="#c8ffda" opacity="0.65">
          <circle cx="265" cy="550" r="18"/>
          <circle cx="759" cy="550" r="18"/>
          <circle cx="265" cy="760" r="18"/>
          <circle cx="759" cy="760" r="18"/>
        </g>

        <!-- Right-side connector -->
        <rect x="715" y="630" width="56" height="120" rx="12" fill="#28a858"/>
        <rect x="724" y="642" width="38" height="96" rx="10" fill="url(#metalGrad)" opacity="0.35"/>
      </g>

      <!-- Black HAT board -->
      <g>
        <rect x="300" y="360" width="520" height="290" rx="44" fill="url(#boardGrad)"/>
        <rect x="320" y="380" width="480" height="250" rx="34" fill="#1b2230" opacity="0.55"/>

        <!-- Pin header shadow bar -->
        <rect x="318" y="632" width="484" height="58" rx="16" fill="#0b0f17" opacity="0.65"/>
        <!-- Pins -->
        <g transform="translate(335 640)" fill="#3c495c">
          <!-- 20 pins -->
          <g>
            <rect x="0" y="10" width="12" height="36" rx="4"/>
            <rect x="24" y="10" width="12" height="36" rx="4"/>
            <rect x="48" y="10" width="12" height="36" rx="4"/>
            <rect x="72" y="10" width="12" height="36" rx="4"/>
            <rect x="96" y="10" width="12" height="36" rx="4"/>
            <rect x="120" y="10" width="12" height="36" rx="4"/>
            <rect x="144" y="10" width="12" height="36" rx="4"/>
            <rect x="168" y="10" width="12" height="36" rx="4"/>
            <rect x="192" y="10" width="12" height="36" rx="4"/>
            <rect x="216" y="10" width="12" height="36" rx="4"/>
            <rect x="240" y="10" width="12" height="36" rx="4"/>
            <rect x="264" y="10" width="12" height="36" rx="4"/>
            <rect x="288" y="10" width="12" height="36" rx="4"/>
            <rect x="312" y="10" width="12" height="36" rx="4"/>
            <rect x="336" y="10" width="12" height="36" rx="4"/>
            <rect x="360" y="10" width="12" height="36" rx="4"/>
            <rect x="384" y="10" width="12" height="36" rx="4"/>
            <rect x="408" y="10" width="12" height="36" rx="4"/>
            <rect x="432" y="10" width="12" height="36" rx="4"/>
            <rect x="456" y="10" width="12" height="36" rx="4"/>
          </g>
        </g>

        <!-- Gold pads/screws -->
        <g fill="url(#goldGrad)">
          <circle cx="338" cy="404" r="12"/>
          <circle cx="785" cy="404" r="12"/>
          <circle cx="338" cy="610" r="12"/>
          <circle cx="785" cy="610" r="12"/>
        </g>

        <!-- Left-side gold strip and components -->
        <rect x="315" y="450" width="36" height="132" rx="12" fill="url(#goldGrad)"/>
        <rect x="322" y="462" width="22" height="108" rx="10" fill="#8a5a00" opacity="0.22"/>

        <g transform="translate(360 420)">
          <g fill="url(#goldGrad)">
            <rect x="0" y="0" width="22" height="34" rx="6"/>
            <rect x="0" y="44" width="22" height="34" rx="6"/>
            <rect x="0" y="88" width="22" height="34" rx="6"/>
            <rect x="0" y="132" width="22" height="34" rx="6"/>
          </g>
          <g fill="#0d121b" opacity="0.35">
            <rect x="3" y="6" width="16" height="22" rx="5"/>
            <rect x="3" y="50" width="16" height="22" rx="5"/>
            <rect x="3" y="94" width="16" height="22" rx="5"/>
            <rect x="3" y="138" width="16" height="22" rx="5"/>
          </g>
        </g>

        <!-- Screen -->
        <rect x="410" y="525" width="190" height="72" rx="14" fill="#0e2233" opacity="0.85"/>
        <rect x="420" y="534" width="170" height="54" rx="12" fill="url(#screenGrad)"/>
        <text x="505" y="572" text-anchor="middle"
              font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
              font-size="46" font-weight="800" fill="#0a3b55" opacity="0.35">100%</text>
        <text x="505" y="570" text-anchor="middle"
              font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
              font-size="46" font-weight="800" fill="#d7fbff">100%</text>

        <!-- USB-ish port -->
        <rect x="655" y="540" width="120" height="92" rx="16" fill="#e9eef7"/>
        <rect x="675" y="565" width="80" height="52" rx="10" fill="#1a1f27" opacity="0.9"/>
        <rect x="684" y="573" width="62" height="36" rx="8" fill="#0a0e14" opacity="0.7"/>

        <!-- UPSHAT label -->
        <rect x="662" y="470" width="128" height="44" rx="12" fill="#0e131c" opacity="0.8"/>
        <text x="726" y="500" text-anchor="middle"
              font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
              font-size="22" font-weight="800" fill="#e7edf7">UPS HAT</text>

        <!-- Top small buttons and pads -->
        <g fill="url(#goldGrad)">
          <rect x="690" y="410" width="56" height="26" rx="8"/>
          <rect x="754" y="410" width="44" height="26" rx="8"/>
        </g>
        <rect x="705" y="416" width="26" height="14" rx="6" fill="#8a5a00" opacity="0.22"/>
        <rect x="766" y="416" width="22" height="14" rx="6" fill="#8a5a00" opacity="0.22"/>

        <!-- Batteries -->
        <g transform="translate(0 0)">
          <g>
            <rect x="400" y="295" width="105" height="210" rx="30" fill="url(#batGrad)"/>
            <rect x="520" y="295" width="105" height="210" rx="30" fill="url(#batGrad)"/>
            <!-- tops -->
            <ellipse cx="452.5" cy="305" rx="44" ry="22" fill="#1c2a3b" opacity="0.5"/>
            <ellipse cx="572.5" cy="305" rx="44" ry="22" fill="#1c2a3b" opacity="0.5"/>
            <ellipse cx="452.5" cy="305" rx="34" ry="16" fill="url(#metalGrad)"/>
            <ellipse cx="572.5" cy="305" rx="34" ry="16" fill="url(#metalGrad)"/>
            <ellipse cx="452.5" cy="305" rx="20" ry="9" fill="#6c7a89" opacity="0.55"/>
            <ellipse cx="572.5" cy="305" rx="20" ry="9" fill="#6c7a89" opacity="0.55"/>
            <!-- highlights -->
            <rect x="418" y="315" width="18" height="170" rx="9" fill="#ffffff" opacity="0.22"/>
            <rect x="538" y="315" width="18" height="170" rx="9" fill="#ffffff" opacity="0.22"/>
          </g>
        </g>

        <!-- Lightning bolt -->
        <path d="M740 260
                 L800 260
                 L758 350
                 L820 350
                 L705 505
                 L740 385
                 L685 385 Z"
              fill="#ffd158" stroke="#c88a00" stroke-width="10" stroke-linejoin="round"/>

        <!-- Small bottom-right part on PCB -->
        <rect x="608" y="706" width="70" height="42" rx="10" fill="url(#metalGrad)" opacity="0.95"/>
        <rect x="620" y="716" width="46" height="22" rx="8" fill="#0f1722" opacity="0.25"/>
      </g>
    </g>

    <!-- Bottom label area -->
    <g>
      <rect x="80" y="720" width="864" height="224" rx="0" fill="url(#labelGrad)"/>
      <path d="M80 720
               C200 790 350 820 512 820
               C674 820 824 790 944 720
               L944 944 L80 944 Z"
            fill="#cfe2ff" opacity="0.35"/>
      <text x="512" y="870" text-anchor="middle"
            font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
            font-size="120" font-weight="900" fill="#1d2d4a" letter-spacing="2">
        UPS HAT D
      </text>
    </g>
  </g>

  <!-- Outer rounded border sheen -->
  <rect x="80" y="80" width="864" height="864" rx="170" ry="170"
        fill="none" stroke="#ffffff" stroke-width="10" opacity="0.35"/>
</svg>

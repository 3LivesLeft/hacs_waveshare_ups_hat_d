name: Python tests

on:
  push:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for req in requirements.txt requirements-dev.txt requirements-test.txt; do
            if [ -f "$req" ]; then
              pip install -r "$req"
            fi
          done
          pip install pytest homeassistant pytest-homeassistant-custom-component

      - name: Run pytest
        run: pytest